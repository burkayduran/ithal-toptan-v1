name: Integration Tests

on:
  push:
    branches: ["main", "master", "claude/**"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: pytest (Postgres + Redis)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_ithal
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_ithal
      REDIS_URL: redis://localhost:6379/1
      SECRET_KEY: ci-secret-key-do-not-use-in-production
      EMAIL_PROVIDER: fake
      MOQ_SYNC_STRATEGY: strict

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify syntax (compileall)
        run: python -m compileall app

      - name: Wait for Postgres to be ready
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for postgres..."
            sleep 1
          done

      - name: Wait for Redis to be ready
        run: |
          until redis-cli -p 6379 ping | grep -q PONG; do
            echo "Waiting for redis..."
            sleep 1
          done

      - name: Run integration tests
        run: pytest -q --tb=short

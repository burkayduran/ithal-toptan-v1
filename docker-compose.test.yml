version: '3.9'

# Lightweight test environment — DB + Redis only.
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   TEST_DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5433/toplu_test \
#   REDIS_URL=redis://localhost:6380/0 \
#   python -m pytest backend/tests/ -v
#   docker compose -f docker-compose.test.yml down -v

services:
  db_test:
    image: postgres:16-alpine
    container_name: toplu_db_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: toplu_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data   # in-memory — fast and ephemeral
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis_test:
    image: redis:7-alpine
    container_name: toplu_redis_test
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

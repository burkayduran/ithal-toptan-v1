version: '3.9'

# Test stack – isolated ports, ephemeral volumes, fake email provider.
# Usage:
#   docker compose -f docker-compose.test.yml up --build --abort-on-container-exit
#   # exit code mirrors the test_runner exit code

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: toplu_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/toplu_test
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: test-secret-key-for-testing-only-min32chars
      EMAIL_PROVIDER: fake
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app

  test_runner:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/toplu_test
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: test-secret-key-for-testing-only-min32chars
      EMAIL_PROVIDER: fake
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started
    command: >
      sh -c "
        alembic upgrade head &&
        python scripts/run_all_smoke.py
      "
    volumes:
      - ./backend:/app
